# @package _global_
# Fast-compiling debug config: short seq, large mini_batch (no inner scan), no grad accum.
defaults:
  - override /training: 125m/pretrain-8K
  - override /model: toy_small
  - _self_

training:
  exp_name: pretrain-125m-e2e-debug
  train_mode: meta
  seq_length: 128
  global_batch_size: 1
  accum_steps: 1
  total_steps: 10
  log_wandb: False
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 0.1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 128
  sliding_window_size: 128
  rope_theta: 500000
  prime: True
  suffix_len: 2
  intermediate_size: 128
