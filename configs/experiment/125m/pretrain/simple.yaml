# @package _global_
defaults:
  - override /training: 125m/pretrain-8K
  - override /model: toy_small
  - _self_

training:
  exp_name: pretrain-125m-e2e
  train_mode: meta
  global_batch_size: 64
  global_batch_size: 64
  accum_steps: 64
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 0.1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  # This will be unstable, but shorter compiler times
  mini_batch_size: 1
  sliding_window_size: 8192
  rope_theta: 500000
  prime: True
  suffix_len: 3
  intermediate_size: 1664
