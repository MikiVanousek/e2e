# @package _global_
defaults:
  - override /training: 14m/pretrain-8K
  - override /model: 14m
  - _self_

training:
  train_mode: meta
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 0.1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0

  total_steps: 1500
  global_batch_size: 64

  eval_batch_size: 128
  num_evals: 15
  ilr_warmup_steps: 150
  optimizer_outer:
    lr_decay_steps: 1500
    lr_warmup_steps: 150

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 1024
  sliding_window_size: 8192
  rope_theta: 500000
  prime: True
  suffix_len: 1
  intermediate_size: 832
