# @package _global_
defaults:
  - override /training: 14m/pretrain-8K
  - override /model: 14m
  - _self_

training:
  exp_name: pretrain-14m-e2e-from-fa
  train_mode: meta
  load_part: params
  resume_exp_name: "pretrain-14m-fa"
  resume_step: 1499
  skip_tokens: 786432000
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 0.1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0
  accum_steps: 1
  num_evals: 7

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 1024
  sliding_window_size: 8192
  rope_theta: 500000
  prime: True
  suffix_len: 1
  intermediate_size: 832