# @package _global_
# The goal is to produce an overtrained models and checkpoints on the way. 
defaults:
  - override /training: 14m/pretrain-8K
  - override /model: 14m
  - _self_

training:
  exp_name: pretrain-14m-fa
  train_mode: pretrain
  total_steps: 1500
  global_batch_size: 64

  eval_batch_size: 128
  num_evals: 15
  ilr_warmup_steps: 150
  optimizer_outer:
    lr_decay_steps: 1500
    lr_warmup_steps: 150

model:
  seq_modeling_block: self_attention
  force_flash: True
  mini_batch_size: 8192
  rope_theta: 500000
  remat_block: nothing_saveable
  remat_block_bwd: nothing_saveable
  intermediate_size: 832